<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>PocketDev AI</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

  <!-- TOP BAR -->

  <div class="topbar">
    🤖 PocketDev AI
  </div>

  <!-- CHAT AREA -->

  <div id="chatBox" class="chatBox">

    <div class="welcome">
      Welcome to PocketDev AI
    </div>

  </div>

  <!-- INPUT AREA -->

  <div class="inputArea">

    <textarea
      id="userInput"
      placeholder="Message PocketDev AI..."
      rows="1"
    ></textarea>

    <button id="sendBtn">
      ➤
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
